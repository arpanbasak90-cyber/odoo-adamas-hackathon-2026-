<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HRMS — Human Resource Management System. Manage employees, attendance, leave, and payroll in one place." />
  <meta name="theme-color" content="#4F46E5" />
  <title>HRMS — Human Resource Management System</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS Design System -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>" />
</head>
<body>

  <!-- App Root -->
  <div id="app">
    <!-- Loading state -->
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--color-bg)">
      <div style="width:48px;height:48px;background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px">🏢</div>
      <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
      <div style="font-size:13px;color:var(--color-text-400);font-family:var(--font-family)">Loading HRMS...</div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- JavaScript — Data Layer -->
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed.js"></script>

  <!-- JavaScript — Pages -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/signup.js"></script>
  <script src="js/pages/employees.js"></script>
  <script src="js/pages/attendance.js"></script>
  <script src="js/pages/leave.js"></script>
  <script src="js/pages/profile.js"></script>

  <!-- JavaScript — App Shell & Router (last, depends on all above) -->
  <script src="js/app.js"></script>

</body>
</html>
